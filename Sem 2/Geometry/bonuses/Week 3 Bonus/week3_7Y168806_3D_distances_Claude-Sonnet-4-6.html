<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Distance Visualizer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
#sidebar {
  width: 260px; min-width: 260px; background: #16213e; padding: 14px;
  display: flex; flex-direction: column; gap: 10px; overflow-y: auto;
  border-right: 1px solid #0f3460;
}
h2 { color: #e94560; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; }
.section { background: #0f3460; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; gap: 7px; }
label { font-size: 0.78rem; color: #a0a0c0; }
input[type="text"], input[type="number"] {
  background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0;
  padding: 5px 8px; border-radius: 4px; width: 100%; font-size: 0.82rem;
}
input:focus { outline: none; border-color: #e94560; }
.coords-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
button {
  background: #e94560; color: white; border: none; padding: 7px 10px;
  border-radius: 4px; cursor: pointer; font-size: 0.82rem; transition: background 0.2s;
}
button:hover { background: #c73652; }
button.sec { background: #0f3460; }
button.sec:hover { background: #1a4a80; }
.obj-item {
  display: flex; align-items: center; gap: 6px; padding: 5px 8px;
  background: #1a1a2e; border-radius: 4px; font-size: 0.78rem;
  border-left: 3px solid #555; cursor: pointer; transition: all 0.2s;
}
.obj-item:hover { border-color: #e94560; }
.obj-item.selected { border-color: #ffd700; background: #1e1e3a; }
.obj-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.obj-label { font-weight: bold; flex: 1; }
.obj-eq { color: #a0a0c0; font-size: 0.72rem; flex: 2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn-del { background: transparent; color: #e94560; border: none; padding: 2px 5px; font-size: 0.9rem; cursor: pointer; }
#dist-box {
  background: #0f3460; border-radius: 8px; padding: 12px;
  font-size: 0.85rem; min-height: 60px; color: #a0a0c0;
}
#dist-box .dist-val { color: #ffd700; font-size: 1.1rem; font-weight: bold; }
#canvas-container { flex: 1; position: relative; }
canvas { display: block; width: 100%; height: 100%; }
.info-bar {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(15,52,96,0.85); padding: 5px 14px; border-radius: 20px;
  font-size: 0.72rem; color: #a0a0c0; pointer-events: none;
}
.tag { display: inline-block; background: #1a1a2e; border-radius: 3px; padding: 1px 5px; font-size: 0.7rem; color: #e94560; margin-left: 4px; }
</style>
</head>
<body>
<div id="sidebar">
  <h2>3D Distance Visualizer</h2>

  <div class="section">
    <h2>Add Point</h2>
    <div class="coords-row">
      <div><label>X</label><input type="number" id="px" value="0" step="0.1" onkeydown="enterNav(event,'py')"></div>
      <div><label>Y</label><input type="number" id="py" value="0" step="0.1" onkeydown="enterNav(event,'pz')"></div>
      <div><label>Z</label><input type="number" id="pz" value="0" step="0.1" onkeydown="if(event.key==='Enter'){addPoint();}"></div>
    </div>
    <button onclick="addPoint()">Add Point</button>
  </div>

  <div class="section">
    <h2>Add Line</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">
      <div><label>x</label><input type="number" id="lx0" value="0" step="0.1" onkeydown="enterNav(event,'la')"></div>
      <div><label>dx</label><input type="number" id="la" value="1" step="0.1" onkeydown="enterNav(event,'ly0')"></div>
      <div><label>y</label><input type="number" id="ly0" value="0" step="0.1" onkeydown="enterNav(event,'lb')"></div>
      <div><label>dy</label><input type="number" id="lb" value="0" step="0.1" onkeydown="enterNav(event,'lz0')"></div>
      <div><label>z</label><input type="number" id="lz0" value="0" step="0.1" onkeydown="enterNav(event,'lc')"></div>
      <div><label>dz</label><input type="number" id="lc" value="0" step="0.1" onkeydown="if(event.key==='Enter'){addLine();}"></div>
    </div>
    <button onclick="addLine()">Add Line</button>
  </div>

  <div class="section">
    <h2>Add Plane</h2>
    <label>Equation: Ax + By + Cz + D = 0</label>
    <div class="coords-row">
      <div><label>A</label><input type="number" id="plA" value="1" step="0.1" onkeydown="enterNav(event,'plB')"></div>
      <div><label>B</label><input type="number" id="plB" value="0" step="0.1" onkeydown="enterNav(event,'plC')"></div>
      <div><label>C</label><input type="number" id="plC" value="0" step="0.1" onkeydown="enterNav(event,'plD')"></div>
    </div>
    <div><label>D</label><input type="number" id="plD" value="0" step="0.1" onkeydown="if(event.key==='Enter'){addPlane();}"></div>
    <button onclick="addPlane()">Add Plane</button>
  </div>

  <div class="section">
    <h2>Objects <span id="obj-count" style="color:#a0a0c0;font-size:0.8rem">(click to select, max 2)</span></h2>
    <div id="obj-list" style="display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto;">
      <div style="color:#555;font-size:0.78rem;text-align:center;padding:8px">No objects yet</div>
    </div>
  </div>

  <div id="dist-box">
    <div style="color:#a0a0c0;font-size:0.78rem;margin-bottom:4px">Distance</div>
    <div id="dist-result">Select 2 objects to compute distance.</div>
  </div>

  <button class="sec" onclick="clearAll()">Clear All</button>
</div>

<div id="canvas-container">
  <canvas id="c"></canvas>
  <div class="info-bar">Drag to rotate · Scroll to zoom · Objects: <span id="obj-count2">0</span></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let objects = [];
let selected = [];
let objCounter = { P: 0, L: 0, Pl: 0 };
const COLORS = ['#e94560','#4ecdc4','#45b7d1','#96ceb4','#ffeaa7','#dda0dd','#98d8c8','#f7dc6f','#bb8fce','#85c1e9'];

// Camera state
let rotX = 0.4, rotY = 0.6;
let zoom = 1;
let dragging = false, lastMX = 0, lastMY = 0;
let scale = 100;

function resize() {
  const c = document.getElementById('canvas-container');
  canvas.width = c.clientWidth;
  canvas.height = c.clientHeight;
  draw();
}

window.addEventListener('resize', resize);

canvas.addEventListener('mousedown', e => { dragging = true; lastMX = e.clientX; lastMY = e.clientY; });
canvas.addEventListener('mouseup', () => dragging = false);
canvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  rotY += (e.clientX - lastMX) * 0.01;
  rotX += (e.clientY - lastMY) * 0.01;
  lastMX = e.clientX; lastMY = e.clientY;
  draw();
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  zoom *= e.deltaY > 0 ? 0.92 : 1.08;
  zoom = Math.max(0.3, Math.min(5, zoom));
  draw();
}, { passive: false });

// Touch support
let lastTouchDist = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { dragging = true; lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY; }
  if (e.touches.length === 2) { lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }
});
canvas.addEventListener('touchend', () => dragging = false);
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    rotY += (e.touches[0].clientX - lastMX) * 0.01;
    rotX += (e.touches[0].clientY - lastMY) * 0.01;
    lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
    draw();
  }
  if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    zoom *= d / lastTouchDist; zoom = Math.max(0.3, Math.min(5, zoom));
    lastTouchDist = d; draw();
  }
}, { passive: false });

function project(x, y, z) {
  // Rotate around X then Y
  let y1 = y * Math.cos(rotX) - z * Math.sin(rotX);
  let z1 = y * Math.sin(rotX) + z * Math.cos(rotX);
  let x2 = x * Math.cos(rotY) + z1 * Math.sin(rotY);
  let z2 = -x * Math.sin(rotY) + z1 * Math.cos(rotY);
  const fov = 600;
  const zOff = 5;
  const s = fov / (fov + z2 + zOff);
  return { sx: x2 * s * scale * zoom + canvas.width / 2, sy: -y1 * s * scale * zoom + canvas.height / 2, depth: z2 };
}

function computeScale() {
  if (objects.length === 0) { scale = 60; return; }
  let maxCoord = 1;
  for (const o of objects) {
    if (o.type === 'point') maxCoord = Math.max(maxCoord, Math.abs(o.x), Math.abs(o.y), Math.abs(o.z));
    if (o.type === 'line') maxCoord = Math.max(maxCoord, Math.abs(o.x0), Math.abs(o.y0), Math.abs(o.z0));
  }
  scale = Math.min(80, 400 / maxCoord);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  computeScale();
  drawGrid();
  drawAxes();
  for (const o of objects) drawObject(o);
  drawDistanceLine();
}

function drawGrid() {
  const gridSize = 7;
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for (let i = -gridSize; i <= gridSize; i++) {
    const a = project(i, 0, -gridSize), b = project(i, 0, gridSize);
    ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();
    const c = project(-gridSize, 0, i), d = project(gridSize, 0, i);
    ctx.beginPath(); ctx.moveTo(c.sx, c.sy); ctx.lineTo(d.sx, d.sy); ctx.stroke();
  }
}

function drawAxes() {
  const axes = [
    { from: [-8,0,0], to: [8,0,0], color: '#e94560', label: 'X' },
    { from: [0,-8,0], to: [0,8,0], color: '#4ecdc4', label: 'Y' },
    { from: [0,0,-8], to: [0,0,8], color: '#45b7d1', label: 'Z' },
  ];
  for (const ax of axes) {
    const a = project(...ax.from), b = project(...ax.to);
    ctx.strokeStyle = ax.color; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();
    ctx.fillStyle = ax.color; ctx.font = 'bold 13px Segoe UI';
    ctx.fillText(ax.label, b.sx + 4, b.sy + 4);
  }
  // Origin
  const o = project(0,0,0);
  ctx.fillStyle = '#ffffff44';
  ctx.beginPath(); ctx.arc(o.sx, o.sy, 3, 0, Math.PI*2); ctx.fill();
}

function drawObject(o) {
  const isSel = selected.includes(o.id);
  const color = o.color;
  if (o.type === 'point') {
    const p = project(o.x, o.y, o.z);
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(p.sx, p.sy, isSel ? 8 : 6, 0, Math.PI*2); ctx.fill();
    if (isSel) { ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2; ctx.stroke(); }
    ctx.fillStyle = '#fff'; ctx.font = '11px Segoe UI';
    ctx.fillText(o.label, p.sx + 8, p.sy - 6);
  } else if (o.type === 'line') {
    const BOUND = 7;
    const [t1, t2] = lineClipBounds(o.x0, o.y0, o.z0, o.a, o.b, o.c, BOUND);
    const p1 = project(o.x0 + o.a*t1, o.y0 + o.b*t1, o.z0 + o.c*t1);
    const p2 = project(o.x0 + o.a*t2, o.y0 + o.b*t2, o.z0 + o.c*t2);
    ctx.strokeStyle = color; ctx.lineWidth = isSel ? 3 : 2;
    ctx.beginPath(); ctx.moveTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy); ctx.stroke();
    if (isSel) { ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1; ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]); }
    const mid = project(o.x0, o.y0, o.z0);
    ctx.fillStyle = '#fff'; ctx.font = '11px Segoe UI';
    ctx.fillText(o.label, mid.sx + 6, mid.sy - 6);
  } else if (o.type === 'plane') {
    drawPlane(o, isSel);
  }
}

function drawPlane(o, isSel) {
  const { A, B, C, D } = o;
  const norm = Math.sqrt(A*A + B*B + C*C);
  if (norm === 0) return;
  // Find a point on the plane
  let px = 0, py = 0, pz = 0;
  if (Math.abs(A) >= Math.abs(B) && Math.abs(A) >= Math.abs(C)) px = -D/A;
  else if (Math.abs(B) >= Math.abs(C)) py = -D/B;
  else pz = -D/C;

  // Two tangent vectors
  let u, v;
  const n = [A/norm, B/norm, C/norm];
  if (Math.abs(n[0]) < 0.9) u = normalize(cross(n, [1,0,0]));
  else u = normalize(cross(n, [0,1,0]));
  v = normalize(cross(n, u));

  const size = 7;
  const corners = [
    add3([px,py,pz], add3(scale3(u, size), scale3(v, size))),
    add3([px,py,pz], add3(scale3(u, size), scale3(v, -size))),
    add3([px,py,pz], add3(scale3(u, -size), scale3(v, -size))),
    add3([px,py,pz], add3(scale3(u, -size), scale3(v, size))),
  ];
  const pts = corners.map(c => project(c[0], c[1], c[2]));
  const col = hexToRgba(o.color, 0.18);
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo(pts[0].sx, pts[0].sy);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].sx, pts[i].sy);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = isSel ? '#ffd700' : o.color; ctx.lineWidth = isSel ? 2 : 1.5;
  ctx.stroke();
  const mid = project(px, py, pz);
  ctx.fillStyle = '#fff'; ctx.font = '11px Segoe UI';
  ctx.fillText(o.label, mid.sx + 6, mid.sy - 6);
}

function drawDistanceLine() {
  if (selected.length !== 2) return;
  const o1 = objects.find(o => o.id === selected[0]);
  const o2 = objects.find(o => o.id === selected[1]);
  if (!o1 || !o2) return;
  const res = computeDistance(o1, o2);
  if (!res || res.p1 === null) return;
  const a = project(...res.p1), b = project(...res.p2);
  ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2; ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#ffd700'; ctx.font = 'bold 13px Segoe UI';
  const mx = (a.sx + b.sx)/2, my = (a.sy + b.sy)/2;
  ctx.fillText(res.dist.toFixed(3), mx + 6, my - 6);
}

// Clip a parametric line to a cube [-B,B]^3, returns [tMin, tMax]
function lineClipBounds(x0, y0, z0, dx, dy, dz, B) {
  let tMin = -Infinity, tMax = Infinity;
  const clip = (p, d) => {
    if (Math.abs(d) < 1e-12) { if (p < -B || p > B) { tMin = 1; tMax = -1; } }
    else { const t1 = (-B - p)/d, t2 = (B - p)/d; tMin = Math.max(tMin, Math.min(t1,t2)); tMax = Math.min(tMax, Math.max(t1,t2)); }
  };
  clip(x0, dx); clip(y0, dy); clip(z0, dz);
  if (tMin > tMax) return [-B, B]; // fallback
  return [tMin, tMax];
}

// --- Math helpers ---
function cross(a, b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
function dot(a, b) { return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]; }
function sub3(a, b) { return [a[0]-b[0], a[1]-b[1], a[2]-b[2]]; }
function add3(a, b) { return [a[0]+b[0], a[1]+b[1], a[2]+b[2]]; }
function scale3(a, s) { return [a[0]*s, a[1]*s, a[2]*s]; }
function len3(a) { return Math.sqrt(a[0]*a[0]+a[1]*a[1]+a[2]*a[2]); }
function normalize(a) { const l = len3(a); return l === 0 ? [0,0,0] : [a[0]/l, a[1]/l, a[2]/l]; }
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// --- Distance computations ---
function computeDistance(o1, o2) {
  const t1 = o1.type, t2 = o2.type;
  if (t1 === 'point' && t2 === 'point') return distPP(o1, o2);
  if (t1 === 'point' && t2 === 'line') return distPL(o1, o2);
  if (t1 === 'line' && t2 === 'point') return distPL(o2, o1);
  if (t1 === 'point' && t2 === 'plane') return distPPl(o1, o2);
  if (t1 === 'plane' && t2 === 'point') return distPPl(o2, o1);
  if (t1 === 'line' && t2 === 'line') return distLL(o1, o2);
  if (t1 === 'line' && t2 === 'plane') return distLPl(o1, o2);
  if (t1 === 'plane' && t2 === 'line') return distLPl(o2, o1);
  if (t1 === 'plane' && t2 === 'plane') return distPlPl(o1, o2);
  return null;
}

function distPP(p1, p2) {
  const d = Math.sqrt((p1.x-p2.x)**2+(p1.y-p2.y)**2+(p1.z-p2.z)**2);
  return { dist: d, p1: [p1.x,p1.y,p1.z], p2: [p2.x,p2.y,p2.z] };
}

function distPL(pt, ln) {
  const P = [pt.x, pt.y, pt.z];
  const Q = [ln.x0, ln.y0, ln.z0];
  const d = [ln.a, ln.b, ln.c];
  const PQ = sub3(P, Q);
  const t = dot(PQ, d) / dot(d, d);
  const foot = add3(Q, scale3(d, t));
  const dist = len3(sub3(P, foot));
  return { dist, p1: P, p2: foot };
}

function distPPl(pt, pl) {
  const { A, B, C, D } = pl;
  const norm = Math.sqrt(A*A+B*B+C*C);
  const dist = Math.abs(A*pt.x + B*pt.y + C*pt.z + D) / norm;
  const t = -(A*pt.x + B*pt.y + C*pt.z + D) / (norm*norm);
  const foot = [pt.x + A*t, pt.y + B*t, pt.z + C*t];
  return { dist, p1: [pt.x,pt.y,pt.z], p2: foot };
}

function distLL(l1, l2) {
  const d1 = [l1.a, l1.b, l1.c];
  const d2 = [l2.a, l2.b, l2.c];
  const w = sub3([l1.x0,l1.y0,l1.z0], [l2.x0,l2.y0,l2.z0]);
  const cr = cross(d1, d2);
  const crLen = len3(cr);
  if (crLen < 1e-10) {
    // Parallel — closest points: project l2's origin onto l1, then offset
    const dist = len3(cross(w, d1)) / len3(d1);
    const t = dot(w, d1) / dot(d1, d1);
    const cp1 = add3([l1.x0,l1.y0,l1.z0], scale3(d1, t));
    const cp2 = [l2.x0, l2.y0, l2.z0];
    return { dist, p1: cp1, p2: cp2 };
  }
  const dist = Math.abs(dot(w, cr)) / crLen;
  // Closest points
  const b = dot(d1, d2), e = dot(d1, w), f = dot(d2, w);
  const denom = dot(d1,d1)*dot(d2,d2) - b*b;
  const t1 = (b*f - dot(d2,d2)*e) / denom;
  const t2 = (dot(d1,d1)*f - b*e) / denom;
  const p1 = add3([l1.x0,l1.y0,l1.z0], scale3(d1, t1));
  const p2 = add3([l2.x0,l2.y0,l2.z0], scale3(d2, t2));
  return { dist, p1, p2 };
}

function distLPl(ln, pl) {
  const { A, B, C, D } = pl;
  const d = [ln.a, ln.b, ln.c];
  const norm = [A, B, C];
  const dp = dot(d, norm);
  if (Math.abs(dp) < 1e-10) {
    // Parallel or in plane — closest point: foot from line's origin to plane
    const normLen = len3(norm);
    const dist = Math.abs(A*ln.x0 + B*ln.y0 + C*ln.z0 + D) / normLen;
    const t = -(A*ln.x0 + B*ln.y0 + C*ln.z0 + D) / (normLen*normLen);
    const foot = [ln.x0 + A*t, ln.y0 + B*t, ln.z0 + C*t];
    return { dist, p1: [ln.x0,ln.y0,ln.z0], p2: foot };
  }
  // Intersects — find intersection point
  const t = -(A*ln.x0 + B*ln.y0 + C*ln.z0 + D) / dp;
  const pt = add3([ln.x0,ln.y0,ln.z0], scale3(d, t));
  return { dist: 0, p1: pt, p2: pt };
}

function distPlPl(pl1, pl2) {
  const n1 = [pl1.A, pl1.B, pl1.C], n2 = [pl2.A, pl2.B, pl2.C];
  const cr = cross(n1, n2);
  if (len3(cr) < 1e-10) {
    // Parallel — find a point on pl1 and its foot on pl2
    const norm1 = len3(n1), norm2 = len3(n2);
    const d1n = pl1.D / norm1, d2n = pl2.D / norm2;
    const dist2 = Math.abs(d1n - d2n);
    // Point on pl1
    let px=0,py=0,pz=0;
    if (Math.abs(pl1.A)>=Math.abs(pl1.B)&&Math.abs(pl1.A)>=Math.abs(pl1.C)) px=-pl1.D/pl1.A;
    else if (Math.abs(pl1.B)>=Math.abs(pl1.C)) py=-pl1.D/pl1.B;
    else pz=-pl1.D/pl1.C;
    const t = -(pl2.A*px+pl2.B*py+pl2.C*pz+pl2.D)/(norm2*norm2);
    const foot=[px+pl2.A*t,py+pl2.B*t,pz+pl2.C*t];
    return { dist: dist2, p1: [px,py,pz], p2: foot };
  }
  // Intersecting planes — find a point on the intersection line, then use it as both endpoints
  let px=0,py=0,pz=0;
  if (Math.abs(pl1.A)>=Math.abs(pl1.B)&&Math.abs(pl1.A)>=Math.abs(pl1.C)) px=-pl1.D/pl1.A;
  else if (Math.abs(pl1.B)>=Math.abs(pl1.C)) py=-pl1.D/pl1.B;
  else pz=-pl1.D/pl1.C;
  return { dist: 0, p1: [px,py,pz], p2: [px,py,pz] };
}

// --- UI ---
function getColor(idx) { return COLORS[idx % COLORS.length]; }

function addPoint() {
  const x = parseFloat(document.getElementById('px').value) || 0;
  const y = parseFloat(document.getElementById('py').value) || 0;
  const z = parseFloat(document.getElementById('pz').value) || 0;
  objCounter.P++;
  const id = Date.now();
  const color = getColor(objects.length);
  objects.push({ id, type: 'point', label: `P${objCounter.P}`, x, y, z, color });
  updateList(); draw();
}

function addLine() {
  const x0 = parseFloat(document.getElementById('lx0').value) || 0;
  const y0 = parseFloat(document.getElementById('ly0').value) || 0;
  const z0 = parseFloat(document.getElementById('lz0').value) || 0;
  const a = parseFloat(document.getElementById('la').value) || 1;
  const b = parseFloat(document.getElementById('lb').value) || 0;
  const c = parseFloat(document.getElementById('lc').value) || 0;
  if (a === 0 && b === 0 && c === 0) { alert('Direction vector cannot be zero!'); return; }
  objCounter.L++;
  const id = Date.now();
  const color = getColor(objects.length);
  objects.push({ id, type: 'line', label: `L${objCounter.L}`, x0, y0, z0, a, b, c, color });
  updateList(); draw();
}

function addPlane() {
  const A = parseFloat(document.getElementById('plA').value) || 0;
  const B = parseFloat(document.getElementById('plB').value) || 0;
  const C = parseFloat(document.getElementById('plC').value) || 0;
  const D = parseFloat(document.getElementById('plD').value) || 0;
  if (A === 0 && B === 0 && C === 0) { alert('Normal vector (A,B,C) cannot be zero!'); return; }
  objCounter.Pl++;
  const id = Date.now();
  const color = getColor(objects.length);
  objects.push({ id, type: 'plane', label: `Pl${objCounter.Pl}`, A, B, C, D, color });
  updateList(); draw();
}

function toggleSelect(id) {
  if (selected.includes(id)) {
    selected = selected.filter(s => s !== id);
  } else {
    if (selected.length >= 2) selected.shift();
    selected.push(id);
  }
  updateDistance();
  updateList();
  draw();
}

function removeObj(id) {
  objects = objects.filter(o => o.id !== id);
  selected = selected.filter(s => s !== id);
  updateDistance();
  updateList();
  draw();
}

function clearAll() {
  objects = []; selected = [];
  objCounter = { P: 0, L: 0, Pl: 0 };
  updateList(); updateDistance(); draw();
}

function updateDistance() {
  const el = document.getElementById('dist-result');
  if (selected.length < 2) { el.innerHTML = 'Select 2 objects to compute distance.'; return; }
  const o1 = objects.find(o => o.id === selected[0]);
  const o2 = objects.find(o => o.id === selected[1]);
  if (!o1 || !o2) { el.innerHTML = 'Select 2 objects to compute distance.'; return; }
  const res = computeDistance(o1, o2);
  if (!res) { el.innerHTML = 'Cannot compute distance for these types.'; return; }
  el.innerHTML = `<b style="color:#a0a0c0">${o1.label}</b> ↔ <b style="color:#a0a0c0">${o2.label}</b><br><span class="dist-val">Distance = ${res.dist.toFixed(4)}</span>`;
}

function updateList() {
  const el = document.getElementById('obj-list');
  document.getElementById('obj-count2').textContent = objects.length;
  if (objects.length === 0) { el.innerHTML = '<div style="color:#555;font-size:0.78rem;text-align:center;padding:8px">No objects yet</div>'; return; }
  el.innerHTML = objects.map(o => {
    const isSel = selected.includes(o.id);
    let eq = '';
    if (o.type === 'point') eq = `(${o.x}, ${o.y}, ${o.z})`;
    else if (o.type === 'line') eq = `(${o.x0},${o.y0},${o.z0}) + t(${o.a},${o.b},${o.c})`;
    else if (o.type === 'plane') eq = `${o.A}x+${o.B}y+${o.C}z+${o.D}=0`;
    return `<div class="obj-item${isSel?' selected':''}" onclick="toggleSelect(${o.id})">
      <div class="obj-dot" style="background:${o.color}"></div>
      <span class="obj-label">${o.label}</span>
      <span class="obj-eq">${eq}</span>
      <button class="btn-del" onclick="event.stopPropagation();removeObj(${o.id})">✕</button>
    </div>`;
  }).join('');
}

function enterNav(e, nextId) {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById(nextId).focus(); }
}

resize();
draw();
</script>
</body>
</html>
